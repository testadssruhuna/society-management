  <body>
    <!-- Instant pre-React auth check: redirect /login to dashboard if already logged in -->
    <script>
      (function() {
        // Set background instantly from cached theme to prevent white flash
        var theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.style.background = theme === 'dark' ? '#09090b' : '#fafafa';

        // If visiting /login and already have a cached session, redirect immediately (before React loads)
        var path = window.location.pathname;
        if (path === '/login') {
          try {
            var auth = localStorage.getItem('adss-auth');
            var profile = localStorage.getItem('adss-profile-cache');
            if (auth && JSON.parse(auth).user && profile) {
              window.location.replace('/');
            }
          } catch(e) {}
        }
      })();
    </script>
    <div id="root"></div>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((reg) => {
              console.log('[PWA] Service Worker registered, scope:', reg.scope);
            })
            .catch((err) => {
              console.warn('[PWA] Service Worker registration failed:', err);
            });
        });
      }
    </script>
